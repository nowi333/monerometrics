---
# Playbook principal monerometrics
# Applique les roles communs sur tous les hotes, puis specialise par groupe

- name: Configure bastion (hardening CIS L1 + Tailscale)
  hosts: bastion
  gather_facts: true
  become: false
  roles:
    - common
    - tailscale

- name: Configure edge (hardening CIS L1 + nginx + Let's Encrypt TLS)
  hosts: edge
  gather_facts: true
  become: false
  roles:
    - common
    - nginx
    - letsencrypt
