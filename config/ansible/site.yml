---
# Playbook principal monerometrics

- name: Configure bastion (hardening CIS L1 + Tailscale)
  hosts: bastion
  gather_facts: true
  become: false
  roles:
    - common
    - tailscale

- name: Configure edge (hardening CIS L1 + nginx + TLS + WAF ModSecurity)
  hosts: edge
  gather_facts: true
  become: false
  roles:
    - common
    - nginx
    - letsencrypt
    - modsecurity

- name: Configure k3s (hardening CIS L1 + Kubernetes single-node)
  hosts: k3s
  gather_facts: true
  become: false
  roles:
    - common
    - k3s
