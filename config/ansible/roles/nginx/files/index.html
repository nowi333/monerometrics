<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Monerometrics — Building production-grade Monero infrastructure</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0F0F11;
      color: #E5E5E7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .container {
      max-width: 640px;
      text-align: center;
    }
    .logo {
      font-size: 2.5rem;
      font-weight: 600;
      letter-spacing: -0.03em;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, #F26822 0%, #FF8C42 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .tagline {
      font-size: 1.1rem;
      color: #A1A1A6;
      margin-bottom: 3rem;
      line-height: 1.5;
    }
    .status {
      display: inline-block;
      padding: 0.5rem 1rem;
      background: rgba(242, 104, 34, 0.1);
      border: 1px solid rgba(242, 104, 34, 0.3);
      border-radius: 999px;
      font-size: 0.875rem;
      color: #F26822;
      margin-bottom: 2rem;
    }
    .footer {
      margin-top: 3rem;
      font-size: 0.8rem;
      color: #6B6B6F;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="status">⬤ Coming soon — Q3 2026</div>
    <h1 class="logo">Monerometrics</h1>
    <p class="tagline">
      Building production-grade infrastructure for reorg-aware Monero data services.
    </p>
    <p class="footer">
      &copy; 2026 Monerometrics &middot; Hosted in Sweden &middot; Privacy by design
    </p>
  </div>
</body>
</html>
