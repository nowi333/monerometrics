---
# Defaults du role data_disk
# Monte le volume de donnees Hetzner sur /var/lib/monerometrics-data.
#
# Un volume Hetzner attache apparait sous un chemin stable :
#   /dev/disk/by-id/scsi-0HC_Volume_<id>
# data_disk_device vide => decouverte automatique via le glob ci-dessous
# (il n'y a qu'un seul volume de donnees sur le noeud k3s).
data_disk_device: ""
data_disk_device_glob: "/dev/disk/by-id/scsi-0HC_Volume_*"
data_disk_mountpoint: "/var/lib/monerometrics-data"
data_disk_fstype: "ext4"
data_disk_owner: "root"
data_disk_group: "root"
data_disk_mode: "0755"
