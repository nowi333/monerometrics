name: dashboard

on:
  push:
    branches: [main]
    paths:
      - 'apps/dashboard/**'
      - '.github/workflows/dashboard.yml'
  pull_request:
    paths:
      - 'apps/dashboard/**'
      - '.github/workflows/dashboard.yml'

# Least privilege : lint + build uniquement, aucune ecriture.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/dashboard
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: apps/dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
