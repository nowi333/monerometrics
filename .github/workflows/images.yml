name: images

# Validation de build des images worker / api (linux/amd64) a chaque changement
# du code applicatif. BUILD ONLY : on ne pousse pas vers GHCR. Les images
# versionnees (0.x.y) sont construites et poussees a la main (le GITHUB_TOKEN
# n'a pas de droit d'ecriture sur des packages crees hors Actions).
#
# Pour activer le push depuis la CI plus tard, au choix :
#   - GitHub > Packages > <image> > Manage Actions access > ajouter ce repo en
#     Write, puis ajouter une etape docker/login-action (GITHUB_TOKEN) + push: true ;
#   - ou stocker un PAT (write:packages) en secret et l'utiliser au login.

on:
  push:
    branches: [main]
    paths:
      - 'apps/worker/**'
      - 'apps/api/**'
      - '.github/workflows/images.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [worker, api]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.app }} image (validation, no push)
        uses: docker/build-push-action@v6
        with:
          context: apps/${{ matrix.app }}
          platforms: linux/amd64
          push: false
