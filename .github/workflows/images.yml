name: images

# Build et publication des images worker / api sur GHCR.
# Declenche quand le code applicatif change (push main) ou manuellement.
# Tags : latest + le SHA du commit. Les deploiements k8s pinnent des versions
# semantiques (0.x.y) construites a la main ; cette CI garantit la buildabilite
# et publie des images latest/SHA tracables.

on:
  push:
    branches: [main]
    paths:
      - 'apps/worker/**'
      - 'apps/api/**'
      - '.github/workflows/images.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [worker, api]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.app }}
        uses: docker/build-push-action@v6
        with:
          context: apps/${{ matrix.app }}
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/nowi333/monerometrics-${{ matrix.app }}:latest
            ghcr.io/nowi333/monerometrics-${{ matrix.app }}:sha-${{ github.sha }}
