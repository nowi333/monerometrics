---
# Secret Postgres en stringData (k8s convertit en base64 a l apply)
# Placeholder uniquement. En prod, le mot de passe reel est injecte par OpenBao
# Pour la prod : injection via External Secrets Operator + OpenBao backend.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: monerometrics
type: Opaque
stringData:
  POSTGRES_USER: monerometrics
  POSTGRES_PASSWORD: REPLACE_ME
  POSTGRES_DB: monerometrics
