---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: backup-operator
  namespace: monerometrics
  labels:
    app: monerometrics-backup
    component: pra
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: backup-reader
  namespace: monerometrics
  labels:
    app: monerometrics-backup
    component: pra
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets", "services", "persistentvolumeclaims", "pods"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "replicasets"]
    verbs: ["get", "list"]
  - apiGroups: ["batch"]
    resources: ["cronjobs", "jobs"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: backup-reader-binding
  namespace: monerometrics
  labels:
    app: monerometrics-backup
    component: pra
subjects:
  - kind: ServiceAccount
    name: backup-operator
    namespace: monerometrics
roleRef:
  kind: Role
  name: backup-reader
  apiGroup: rbac.authorization.k8s.io
