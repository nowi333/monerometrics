---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: monerometrics
  labels:
    app: postgres
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "monerometrics-postgres"
        vault.hashicorp.com/agent-inject-secret-pg-password: "secret/data/postgres/credentials"
        vault.hashicorp.com/agent-inject-template-pg-password: |
          {{- with secret "secret/data/postgres/credentials" -}}{{ .Data.data.POSTGRES_PASSWORD }}{{- end }}
    spec:
      containers:
        - name: postgres
          image: postgres:17-alpine
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              value: monerometrics
            - name: POSTGRES_DB
              value: monerometrics
            - name: POSTGRES_PASSWORD_FILE
              value: /vault/secrets/pg-password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "monerometrics", "-d", "monerometrics"]
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "monerometrics", "-d", "monerometrics"]
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-data
        - name: init-sql
          configMap:
            name: postgres-init-sql
