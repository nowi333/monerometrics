---
# Worker monerometrics : indexe les blocs monerod dans Postgres et detecte les reorgs.
# Image privee sur GHCR -> imagePullSecret ghcr-pull-secret.
# Image alpine 3.13 + psycopg + httpx.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: monerometrics
  labels:
    app: worker
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      annotations:
        # OpenBao injector : sidecar vault-agent qui ecrit /vault/secrets/*
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "monerometrics-worker"
        vault.hashicorp.com/agent-inject-secret-postgres-credentials: "secret/data/postgres/credentials"
        vault.hashicorp.com/agent-inject-template-postgres-credentials: |
          {{- with secret "secret/data/postgres/credentials" -}}
          export POSTGRES_USER="{{ .Data.data.POSTGRES_USER }}"
          export POSTGRES_PASSWORD="{{ .Data.data.POSTGRES_PASSWORD }}"
          export POSTGRES_DB="{{ .Data.data.POSTGRES_DB }}"
          {{- end }}
      labels:
        app: worker
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: worker
          image: ghcr.io/nowi333/monerometrics-worker:0.2.0
          imagePullPolicy: IfNotPresent
          # Credentials Postgres injectes par OpenBao via vault-agent sidecar
          # dans /vault/secrets/postgres-credentials, lus par le worker au demarrage
          env:
            - name: MONEROD_URL
              value: "http://monerod:18081"
            - name: POLL_INTERVAL
              value: "30"
            - name: MAX_BLOCKS_PER_BATCH
              value: "100"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
