---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-monerometrics
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  monerometrics.json: |-
    {
      "annotations": {"list": []},
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "title": "Sync monerod : Pod Ready Status",
          "type": "stat",
          "targets": [{
            "expr": "sum by (pod) (kube_pod_status_ready{namespace=\"monerometrics\", pod=~\"monerod-.*\", condition=\"true\"})",
            "datasource": {"type": "prometheus", "uid": "prometheus"},
            "refId": "A"
          }],
          "fieldConfig": {
            "defaults": {
              "mappings": [
                {"options": {"0": {"text": "Not Ready", "color": "red"}}, "type": "value"},
                {"options": {"1": {"text": "Ready", "color": "green"}}, "type": "value"}
              ],
              "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "green", "value": 1}]}
            }
          },
          "gridPos": {"h": 6, "w": 6, "x": 0, "y": 0},
          "id": 1,
          "datasource": {"type": "prometheus", "uid": "prometheus"}
        },
        {
          "title": "RAM utilisee par pods monerometrics (MB)",
          "type": "timeseries",
          "targets": [{
            "expr": "sum by (pod) (container_memory_working_set_bytes{namespace=\"monerometrics\"}) / 1024 / 1024",
            "datasource": {"type": "prometheus", "uid": "prometheus"},
            "refId": "A",
            "legendFormat": "{{pod}}"
          }],
          "fieldConfig": {
            "defaults": {
              "unit": "MB",
              "custom": {"lineWidth": 1, "fillOpacity": 10}
            }
          },
          "gridPos": {"h": 8, "w": 18, "x": 6, "y": 0},
          "id": 2,
          "datasource": {"type": "prometheus", "uid": "prometheus"}
        },
        {
          "title": "CPU utilise par pods monerometrics (cores)",
          "type": "timeseries",
          "targets": [{
            "expr": "sum by (pod) (rate(container_cpu_usage_seconds_total{namespace=\"monerometrics\", container!=\"\"}[5m]))",
            "datasource": {"type": "prometheus", "uid": "prometheus"},
            "refId": "A",
            "legendFormat": "{{pod}}"
          }],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {"lineWidth": 1, "fillOpacity": 10}
            }
          },
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
          "id": 3,
          "datasource": {"type": "prometheus", "uid": "prometheus"}
        },
        {
          "title": "Volume disque utilise par PVCs monerometrics (%)",
          "type": "bargauge",
          "targets": [{
            "expr": "kubelet_volume_stats_used_bytes{namespace=\"monerometrics\"} / kubelet_volume_stats_capacity_bytes{namespace=\"monerometrics\"} * 100",
            "datasource": {"type": "prometheus", "uid": "prometheus"},
            "refId": "A",
            "legendFormat": "{{persistentvolumeclaim}}"
          }],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "max": 100,
              "min": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": 0},
                  {"color": "orange", "value": 70},
                  {"color": "red", "value": 90}
                ]
              }
            }
          },
          "options": {
            "orientation": "horizontal",
            "displayMode": "gradient"
          },
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8},
          "id": 4,
          "datasource": {"type": "prometheus", "uid": "prometheus"}
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": ["monerometrics"],
      "templating": {"list": []},
      "time": {"from": "now-15m", "to": "now"},
      "timepicker": {},
      "timezone": "browser",
      "title": "monerometrics - Vue d ensemble",
      "uid": "monerometrics-overview",
      "version": 1
    }
