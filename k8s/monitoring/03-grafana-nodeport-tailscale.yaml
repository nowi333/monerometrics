# Service NodePort dedie pour acceder a Grafana via le reseau prive Tailscale.
#
# Pourquoi un service separe (et non une modif du service Helm) :
#   - Le service kube-prometheus-stack-grafana est gere par Helm ; le modifier
#     serait ecrase au prochain upgrade. On ajoute donc un acces a cote.
#
# Securite : le NodePort n'est PAS expose sur Internet. Le noeud k3s n'a aucune
# IP publique et son NSG bloque les acces entrants externes. Le port n'est donc
# joignable que via le maillage Tailscale (modele zero-trust), sur l'IP privee
# du noeud. Acces : http://100.69.180.80:30300
apiVersion: v1
kind: Service
metadata:
  name: grafana-tailscale
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: monerometrics
    access: tailscale-private
spec:
  type: NodePort
  selector:
    app.kubernetes.io/instance: kube-prometheus-stack
    app.kubernetes.io/name: grafana
  ports:
    - name: http-web
      port: 80
      targetPort: 3000
      nodePort: 30300
