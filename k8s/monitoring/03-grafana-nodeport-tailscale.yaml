apiVersion: v1
kind: Service
metadata:
  name: grafana-tailscale
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: monerometrics
    access: tailscale-private
spec:
  type: NodePort
  selector:
    app.kubernetes.io/instance: kube-prometheus-stack
    app.kubernetes.io/name: grafana
  ports:
    - name: http-web
      port: 80
      targetPort: 3000
      nodePort: 30300
